quarkus:
  application:
    name: doc-bucket
  datasource:
    # Default database: SQLite (embedded, zero operational overhead, no separate process). Works in production too.
    # To use PostgreSQL instead: set QUARKUS_DATASOURCE_DB_KIND=postgresql,
    # QUARKUS_DATASOURCE_JDBC_URL, QUARKUS_DATASOURCE_USERNAME, QUARKUS_DATASOURCE_PASSWORD.
    # No rebuild required — both drivers are already on the classpath.
    db-kind: other
    jdbc:
      driver: org.sqlite.JDBC
      url: ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:${DOCBUCKET_DB_FILE:./docbucket.db}}
  hibernate-orm:
    dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    migrate-at-start: true
  http:
    port: 8080
    limits:
      max-body-size: ${DOC_BUCKET_MAX_UPLOAD_BYTES:104857600}  # mirrors doc.bucket.upload.max-bytes
    cors:
      enabled: true
      origins: "*"
      methods: GET,POST,DELETE,OPTIONS,HEAD,PUT,PATCH
      headers: accept,authorization,content-type,x-api-key,x-tenant-id,x-app-id,x-admin-key,x-owner-user-id
      access-control-max-age: 24H
  otel:
    enabled: true
  log:
    console:
      # %X{traceId}/%X{spanId} populated automatically by quarkus-opentelemetry;
      # shown as `trace=<id>/<id>` for cross-service log correlation in Loki.
      format: "%d{HH:mm:ss.SSS} %-5p [%-30c{2.}] [trace=%X{traceId:-}/%X{spanId:-}] %s%e%n"

doc:
  bucket:
    admin-key: ${DOC_BUCKET_ADMIN_KEY:}
    # HMAC-SHA256 server secret — still used for admin key verification in /api/clients.
    # Not used for request auth (superseded by JWT); kept to avoid breaking admin endpoints.
    key-hmac-secret: ${DOC_BUCKET_KEY_HMAC_SECRET:dev-only-insecure-hmac-secret-change-in-prod}
    auth:
      # JWKS endpoint of the auth-service for fetching EC P-256 public keys.
      # Keys are fetched at startup and refreshed on unknown kid (handles rotation).
      jwks-url: ${DOC_BUCKET_AUTH_JWKS_URL:http://localhost:8703/.well-known/jwks.json}
    upload:
      max-bytes: ${DOC_BUCKET_MAX_UPLOAD_BYTES:104857600}          # 100 MB default
      # Optional MIME allowlist (comma-separated). Env: DOC_BUCKET_UPLOAD_MIME_ALLOWLIST
    rate-limit:
      enabled: ${DOC_BUCKET_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${DOC_BUCKET_RATE_LIMIT_RPM:200}
    purge:
      enabled: ${DOC_BUCKET_PURGE_ENABLED:true}
      retention-days: ${DOC_BUCKET_PURGE_RETENTION_DAYS:30}
    presign:
      min-ttl-seconds: ${DOC_BUCKET_PRESIGN_MIN_TTL:60}
      max-ttl-seconds: ${DOC_BUCKET_PRESIGN_MAX_TTL:604800}
  storage:
    endpoint: ${S3_ENDPOINT:http://127.0.0.1:3900}
    region: ${S3_REGION:garage}
    # Garage/MinIO/R2 keys — NOT Amazon-specific; AWS_* names are SDK defaults, see README.
    access-key-id: ${DOC_STORAGE_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
    secret-access-key: ${DOC_STORAGE_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
    path-style-access: ${S3_PATH_STYLE:true}
    default-bucket: ${DOC_BUCKET_BUCKET:documents}

"%dev":
  quarkus:
    datasource:
      # SQLite file in current directory during development — no Docker required.
      jdbc:
        url: ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:${DOCBUCKET_DB_FILE:./docbucket-dev.db}}

"%test":
  quarkus:
    datasource:
      # In-memory SQLite with shared cache so all connections in the test JVM see the same DB.
      jdbc:
        url: jdbc:sqlite:file:docbucket-test?mode=memory&cache=shared
    log:
      level: INFO
    otel:
      enabled: false
  doc:
    bucket:
      key-hmac-secret: "test-hmac-secret-exactly-32-chars!!"
      admin-key: test-admin-plaintext
      auth:
        jwks-url: "http://localhost:0/.well-known/jwks.json"  # unused in tests — JwksCache is pre-loaded directly
      upload:
        max-bytes: 104857600
        mime-allowlist: application/octet-stream
      rate-limit:
        enabled: false
      purge:
        enabled: false
    storage:
      endpoint: http://127.0.0.1:3900
      region: garage
      access-key-id: test
      secret-access-key: test
      path-style-access: true

# No %prod datasource override — SQLite works fine for personal use in production.
# To use PostgreSQL in prod, set these env vars at runtime (no rebuild needed):
#   QUARKUS_DATASOURCE_DB_KIND=postgresql
#   QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://host:5432/docbucket
#   QUARKUS_DATASOURCE_USERNAME=docbucket
#   QUARKUS_DATASOURCE_PASSWORD=...
#   QUARKUS_HIBERNATE_ORM_DIALECT=org.hibernate.dialect.PostgreSQLDialect
